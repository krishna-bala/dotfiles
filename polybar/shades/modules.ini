; Only applies if <ramp-capacity> is used
ramp-capacity-0 = ≤░Β║
ramp-capacity-1 = ≤░Β╗
ramp-capacity-2 = ≤░Β╝
ramp-capacity-3 = ≤░Β╜
ramp-capacity-4 = ≤░Β╛
ramp-capacity-5 = ≤░Β┐
ramp-capacity-6 = ≤░ΓΑ
ramp-capacity-7 = ≤░ΓΒ
ramp-capacity-8 = ≤░ΓΓ
ramp-capacity-9 = ≤░Β╣

