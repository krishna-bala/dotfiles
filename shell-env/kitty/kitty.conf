# >>> general settings
font_size 12.0
cursor_shape block
cursor_blink_interval 0
mouse_hide_wait 2.0
copy_on_select clipboard
strip_trailing_spaces smart
confirm_os_window_close -1
url_style curly
allow_remote_control yes
scrollback_pager_history_size 4000


# >>> font keybindings
map ctrl+shift+equal change_font_size current +0.5
map ctrl+shift+kp_add change_font_size current +0.5
map ctrl+shift+minus change_font_size current -0.5
map ctrl+shift+kp_subtract change_font_size current -0.5

# >>> layouts
enabled_layouts tall, fat, grid, stack

# >>> window settings
window_border_width 3.0pt

# >>> window management
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+n new_window
map ctrl+shift+m toggle_layout stack
map ctrl+shift+z kitten zenmode.py
# >>> leader mode (ctrl+shift+space)
map --new-mode leader --on-action end ctrl+shift+space

# Window navigation: leader + h/j/k/l (stay in leader mode)
map --mode leader h combine : push_keyboard_mode leader : neighboring_window left
map --mode leader j combine : push_keyboard_mode leader : neighboring_window down
map --mode leader k combine : push_keyboard_mode leader : neighboring_window up
map --mode leader l combine : push_keyboard_mode leader : neighboring_window right

# Window movement: leader + H/J/K/L (stay in leader mode)
map --mode leader shift+h combine : push_keyboard_mode leader : move_window left
map --mode leader shift+j combine : push_keyboard_mode leader : move_window down
map --mode leader shift+k combine : push_keyboard_mode leader : move_window up
map --mode leader shift+l combine : push_keyboard_mode leader : move_window right

# Layout
map --mode leader space next_layout

# Detach
map --mode leader d detach_window ask
map --mode leader shift+d detach_tab ask

# Window resize: leader + ctrl+arrow (stay in leader mode)
map --mode leader ctrl+left  combine : push_keyboard_mode leader : resize_window narrower 2
map --mode leader ctrl+right combine : push_keyboard_mode leader : resize_window wider 2
map --mode leader ctrl+up    combine : push_keyboard_mode leader : resize_window taller 2
map --mode leader ctrl+down  combine : push_keyboard_mode leader : resize_window shorter 2

# Cancel (exit leader mode without action)
map --mode leader escape pop_keyboard_mode

# >>> tab settings
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            1
tab_title_template          {title}{' | {}'.format(num_windows) if num_windows > 1 else ''}

# >>> tab management
map ctrl+shift+t new_tab
map ctrl+alt+enter new_tab_with_cwd
map ctrl+alt+[ previous_tab
map ctrl+alt+] next_tab

# BEGIN_KITTY_THEME
# Tokyo Night Storm
include current-theme.conf
# END_KITTY_THEME

# Border color overrides (must come after theme)
# inactive_border_color #3b4261

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# Shift-enter for new line in Claude Code
map shift+enter send_text all \e\r

cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 1
scrollbar scrolled
window_drag_tolerance 2
