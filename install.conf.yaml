- defaults:
    link:
      relink: true

- link:
    ~/.config/bspwm:
      path: bspwm
      force: true
      create: true
    ~/.config/sxhkd:
      path: sxhkd
      force: true
      create: true
    ~/.config/polybar:
      path: polybar
      force: true
      create: true
    ~/.config/picom/picom.conf:
      path: picom.conf
      force: true
      create: true
    ~/.config/dunst/dunstrc:
      path: dunstrc
      force: true
      create: true
    ~/.Xresources:
      path: Xresources
      force: true
    ~/.config/systemd/user/swapescape.service:
      path: systemd/swapescape.service
      create: true
    ~/.local/bin/wacominit:
      path: bin/wacominit
      create: true
    ~/.local/bin/lockscreen:
      path: bin/lockscreen
      create: true
    ~/.local/bin/clipimg:
      path: bin/clipimg
      create: true

- shell:
    - [
        git submodule update --init --recursive,
        Installing/updating submodules,
      ]
    - command: "[ ! -f ~/.config/redshift.conf ] && mkdir -p ~/.config && cp redshift.conf ~/.config/redshift.conf || true"
      description: Copying redshift.conf if needed
      quiet: true
    - command: "cd bspwm && uv sync"
      description: Building monitor-manager venv
      quiet: false
