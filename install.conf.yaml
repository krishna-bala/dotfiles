- defaults:
    link:
      relink: true

- link:
    # --- shell/terminal/dev foundation (bash/, git/, tmux/, kitty/, starship/, claude/) ---
    ~/.bash_aliases:
      force: true
      path: bash/bash_aliases
    ~/.bashrc:
      force: true
      path: bash/bashrc
    ~/.profile:
      force: true
      path: bash/profile
    ~/.inputrc: bash/inputrc
    ~/.bazel_completions.bash: bash/bazel_completions.bash
    ~/.gitconfig:
      force: true
      path: git/gitconfig
    ~/.gitmessage: git/gitmessage
    ~/.git-prompt.sh: git/git-prompt.sh
    ~/.config/lazygit/config.yml:
      path: git/lazygit.yml
      force: true
      create: true
    ~/.config/starship.toml: starship/starship.toml
    ~/.tmux: tmux
    ~/.tmux.conf: tmux/tmux.conf
    ~/.config/kitty:
      path: kitty
      create: true
      force: true
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md
      create: true
    ~/.claude/scripts/status-line.sh:
      path: claude/status-line.sh
      create: true
      force: true
    # --- desktop-environment (bspwm/sxhkd/polybar/picom/dunst stack + standalone leaf configs) ---
    ~/.config/bspwm:
      path: desktop-environment/bspwm
      force: true
      create: true
    ~/.config/sxhkd:
      path: desktop-environment/sxhkd
      force: true
      create: true
    ~/.config/polybar:
      path: desktop-environment/polybar
      force: true
      create: true
    ~/.config/picom/picom.conf:
      path: desktop-environment/picom.conf
      force: true
      create: true
    ~/.config/dunst/dunstrc:
      path: desktop-environment/dunstrc
      force: true
      create: true
    ~/.Xresources:
      path: Xresources
      force: true
    ~/.config/systemd/user/swapescape.service:
      path: systemd/swapescape.service
      create: true
    ~/.local/bin/wacominit:
      path: bin/wacominit
      create: true
    ~/.local/bin/lockscreen:
      path: bin/lockscreen
      create: true
    ~/.local/bin/clipimg:
      path: bin/clipimg
      create: true

- shell:
    - [
        git submodule update --init --recursive,
        Installing/updating submodules,
      ]
    # --- desktop-environment-only steps ---
    - command: "[ ! -f ~/.config/redshift.conf ] && mkdir -p ~/.config && cp redshift.conf ~/.config/redshift.conf || true"
      description: Copying redshift.conf if needed
      quiet: true
    - command: "cd desktop-environment/bspwm && uv sync"
      description: Building monitor-manager venv
      quiet: false
